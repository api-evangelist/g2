  - type: Features
    data:
      - name: Product Data Access
        description: Retrieve detailed product listings including descriptions, ratings, and competitive positioning.
      - name: Review Syndication
        description: Syndicate authenticated user reviews to your own platforms and partner sites.
      - name: Category Taxonomy
        description: Access G2's comprehensive software category taxonomy for classification and discovery.
      - name: Competitive Intelligence
        description: Compare products side-by-side using G2's crowd-sourced review data.
      - name: Buyer Intent Data
        description: Access buyer intent signals showing which companies are researching products in your category.
  - type: UseCases
    data:
      - name: Review Aggregation
        description: Pull and display G2 reviews on your own website or product pages.
      - name: Market Research
        description: Analyze software categories and competitive landscapes using G2's product data.
      - name: Sales Intelligence
        description: Leverage buyer intent data to identify prospects actively researching solutions.
      - name: Product Comparison
        description: Build comparison tools using G2's product ratings and review data.
  - type: Integrations
    data:
      - name: Salesforce
        description: Sync G2 buyer intent data and reviews directly into Salesforce CRM.
      - name: HubSpot
        description: Integrate G2 data with HubSpot for marketing and sales workflows.
      - name: Slack
        description: Receive notifications about new reviews and buyer intent signals in Slack.
      - name: LinkedIn
        description: Leverage G2 data for LinkedIn advertising and account targeting.
      - name: Marketo
        description: Push G2 buyer intent signals into Marketo for demand generation campaigns.
