apis:
  - aid: g2:g2-api
    name: G2 API
    description: >-
      The G2 API provides programmatic access to G2's product, category, and review
      data. It enables developers to retrieve software product listings, user reviews,
      category taxonomies, and competitive intelligence data from the world's largest
      B2B software marketplace. The API supports endpoints for products, categories,
      reviews, and syndication, and uses token-based authentication.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
